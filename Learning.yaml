# 安裝 nuxt 框架
pnpm create nuxt myfirst

# 安裝 Scalar 模組
pnpm nuxi@latest module add @scalar/nuxt

# 安裝 Zod 轉換工具
pnpm add zod @asteasolutions/zod-to-openapi @scalar/api-reference

# 建立server資料夾結構
mkdir -p server/api/users
mkdir -p server/controllers/user
mkdir -p server/middleware
mkdir -p server/services
mkdir -p server/utils
mkdir -p server/models
mkdir -p server/schemas
# 建立 API 路由
touch server/api/users/[id].get.ts
# 建立控制器
touch server/controllers/user/user.controller.ts
# 建立驗證中介軟體
touch server/middleware/auth.ts

# 建立 zod schema
touch server/schemas/user.schema.ts

# 前端呼叫 API 檢核
# 後端驗證 API 輸入資料

# 安裝 Scalar 模組
pnpm add @scalar/nuxt